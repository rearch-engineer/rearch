          description: Guard rail deleted
        "403":
          description: Admin role required

  # ===========================================================================
  # Skills (Admin only)
  # ===========================================================================

  /api/skills:
    get:
      tags:
        - Skills
      summary: List all skills (admin only)
      responses:
        "200":
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
        "403":
          description: Admin role required

    post:
      tags:
        - Skills
      summary: Create a skill (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
              properties:
                title:
                  type: string
                description:
                  type: string
                skillsRepository:
                  type: string
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "403":
          description: Admin role required

  /api/skills/{id}:
    get:
      tags:
        - Skills
      summary: Get a skill by ID (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Skill details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "403":
          description: Admin role required
        "404":
          description: Skill not found

    put:
      tags:
        - Skills
      summary: Update a skill (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                skillsRepository:
                  type: string
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "403":
          description: Admin role required

    delete:
      tags:
        - Skills
      summary: Delete a skill (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Skill deleted
        "403":
          description: Admin role required

  # ===========================================================================
  # Settings
  # ===========================================================================

  /api/settings:
    get:
      tags:
        - Settings
      summary: Get all settings
      description: Retrieves all application settings. Available to any authenticated user.
      responses:
        "200":
          description: List of settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"

  /api/settings/logo:
    post:
      tags:
        - Settings
      summary: Upload application logo (admin only)
      description: |
        Uploads an image file as the application logo. The image is stored in GridFS
        and a reference is saved in the settings collection with key "logo".
        If a logo already exists, the old file is deleted from GridFS before storing the new one.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - logo
              properties:
                logo:
                  type: string
                  format: binary
                  description: Image file (max 2MB, image/* content types only)
      responses:
        "200":
          description: Logo uploaded and setting saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setting"
        "400":
          description: No image file provided or invalid file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin role required

    delete:
      tags:
        - Settings
      summary: Delete application logo (admin only)
      description: Removes the logo setting and deletes the associated image file from GridFS.
      responses:
        "200":
          description: Logo deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "404":
          description: No logo setting found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin role required

  /api/settings/signup:
    put:
      tags:
        - Settings
      summary: Update signup restriction settings (admin only)
      description: >
        Sets signup restriction options for LOCAL auth mode. When restrictSignups is true,
        registration is completely disabled. When allowedDomains is non-empty, only
        emails matching one of the listed domains can register.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                restrictSignups:
                  type: boolean
                  description: When true, new user registrations are completely disabled
                allowedDomains:
                  type: array
                  description: List of allowed email domains (empty array means all domains are allowed)
                  items:
                    type: string
      responses:
        "200":
          description: Signup settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setting"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin role required

  /api/settings/signup/public:
    get:
      tags:
        - Settings
      summary: Get signup restriction settings (public)
      description: >
        Returns the current signup restriction settings without requiring authentication.
        Used by the login page to determine whether to show the registration form.
      security: []
      responses:
        "200":
          description: Signup restriction settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  restrictSignups:
                    type: boolean
                    description: Whether signups are disabled
                    example: false
                  allowedDomains:
                    type: array
                    description: Allowed email domains (empty means all)
                    items:
                      type: string
                    example: []

  # ===========================================================================
  # Jobs (Admin only)
  # ===========================================================================

  /api/jobs:
    get:
      tags:
        - Jobs
      summary: Get aggregated job counts and job list (admin only)
      description: Returns aggregated job counts and a combined list of jobs across all BullMQ queues (resources, conversations) and statuses.
      parameters:
        - in: query
          name: status
          schema:
            type: string
          description: Comma-separated list of statuses to include (default all). Allowed values are active, waiting, completed, failed.
          example: active,failed
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Max jobs per status per queue (default 50, max 200)
      responses:
        "200":
          description: Job counts and list
          content:
            application/json:
              schema:
                type: object
                properties:
                  counts:
                    type: object
                    properties:
                      active:
                        type: integer
                      waiting:
                        type: integer
                      completed:
                        type: integer
                      failed:
                        type: integer
                  jobs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        queue:
                          type: string
                          enum: [resources, conversations]
                        data:
                          type: object
                        status:
                          type: string
                          enum: [active, waiting, completed, failed]
                        returnvalue:
                          type: object
                          nullable: true
                        failedReason:
                          type: string
                          nullable: true
                        timestamp:
                          type: integer
                        processedOn:
                          type: integer
                          nullable: true
                        finishedOn:
                          type: integer
                          nullable: true
                        attemptsMade:
                          type: integer
                        progress:
                          type: integer
        "403":
          description: Admin role required
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/jobs/{queue}/{id}:
    get:
      tags:
        - Jobs
      summary: Get single job details with logs (admin only)
      description: Returns details for a single job including its current state and logs
      parameters:
        - name: queue
          in: path
          required: true
          description: Queue name
          schema:
            type: string
            enum: [resources, conversations]
        - name: id
          in: path
          required: true
          description: Job ID
          schema:
            type: string
      responses:
        "200":
          description: Job details with logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  queue:
                    type: string
                  data:
                    type: object
                  state:
                    type: string
                    description: Current job state
                  returnvalue:
                    type: object
                    nullable: true
                  failedReason:
                    type: string
                    nullable: true
                  stacktrace:
                    type: array
                    items:
                      type: string
                  timestamp:
                    type: integer
                  processedOn:
                    type: integer
                    nullable: true
                  finishedOn:
                    type: integer
                    nullable: true
                  attemptsMade:
                    type: integer
                  progress:
                    type: integer
                  logs:
                    type: array
                    items:
                      type: string
                  logCount:
                    type: integer
        "400":
          description: Unknown queue name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin role required
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===========================================================================
  # Usage Analytics (Admin only)
  # ===========================================================================

  /api/usage/filters:
    get:
      tags:
        - Usage
      summary: Get available filter options for usage dashboard (admin only)
      description: Returns the list of active users and sub-resources (repositories) available for filtering in the usage dashboard.
      responses:
        "200":
          description: Filter options
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        displayName:
                          type: string
                        avatarFileId:
                          type: string
                          nullable: true
                          description: GridFS file ID for the user's avatar image. Use /api/files/public/{fileId} to serve it.
                  subResources:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        name:
                          type: string
                        resourceName:
                          type: string
        "403":
          description: Admin role required
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/usage:
    get:
      tags:
        - Usage
      summary: Get aggregated usage analytics (admin only)
      description: |
        Returns aggregated usage data for the admin dashboard including KPIs,
        cost over time, per-user costs, per-resource costs, conversations list,
        and pull request analytics.
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
          description: Start date (ISO string, default 7 days ago)
        - in: query
          name: to
          schema:
            type: string
            format: date-time
          description: End date (ISO string, default now)
        - in: query
          name: userId
          schema:
            type: string
          description: Filter by user ID (ObjectId)
        - in: query
          name: subResource
          schema:
            type: string
          description: Filter by sub-resource/repository ID (ObjectId)
      responses:
        "200":
          description: Aggregated usage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      totalCost:
                        type: number
                      totalConversations:
                        type: integer
                      avgCostPerConversation:
                        type: number
                      activeConversations:
                        type: integer
                      totalPullRequests:
                        type: integer
                      conversationsWithPRs:
                        type: integer
                      currency:
                        type: string
                        example: USD
                  costOverTime:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          example: "2024-01-15"
                        cost:
                          type: number
                  conversationsOverTime:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        count:
                          type: integer
                  pullRequestsOverTime:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        count:
                          type: integer
                  costPerUser:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                        name:
                          type: string
                        avatarFileId:
                          type: string
                          nullable: true
                          description: GridFS file ID for the user's avatar image. Use /api/files/public/{fileId} to serve it.
                        cost:
                          type: number
                  costPerResource:
                    type: array
                    items:
                      type: object
                      properties:
                        subResourceId:
                          type: string
                        name:
                          type: string
                        cost:
                          type: number
                  conversationsList:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        title:
                          type: string
                        user:
                          type: string
                          description: Display name of the conversation's owner
                        userAvatarFileId:
                          type: string
                          nullable: true
                          description: GridFS file ID for the owner's avatar. Use /api/files/public/{fileId} to serve it.
                        repository:
                          type: string
                        cost:
                          type: number
                        pullRequestsCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                  pullRequestsList:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        title:
                          type: string
                        url:
                          type: string
                        sourceBranch:
                          type: string
                        conversationTitle:
                          type: string
                        conversationId:
                          type: string
                        createdBy:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
        "403":
          description: Admin role required
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
