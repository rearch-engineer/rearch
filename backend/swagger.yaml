                slug:
                  type: string
                prompt:
                  type: string
                systemPrompt:
                  type: string
                code:
                  type: boolean
                active:
                  type: boolean
      responses:
        "200":
          description: Updated flow persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowPersona"
        "403":
          description: Admin role required

    delete:
      tags:
        - Flow Personas
      summary: Delete a flow persona (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Flow persona deleted
        "403":
          description: Admin role required

