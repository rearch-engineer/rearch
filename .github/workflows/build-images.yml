# ============================================================================
# ReArch CI/CD Pipeline - GitHub Actions
# ============================================================================
# Builds and pushes Docker images for frontend, backend, and mcp-proxy
# to GitHub Container Registry (ghcr.io).
#
# Tagging strategy:
#   Push to main  → "dev"    + "sha-<short-sha>"
#   Release        → "latest" + "<version>" (e.g. 1.2.3)
#
# All three images always receive the same tags, ensuring version parity.
#
# Required permissions:
#   - contents: read   (checkout)
#   - packages: write  (push to GHCR)
#
# No additional secrets are needed — authentication uses GITHUB_TOKEN.
# ============================================================================

name: Build & Push Docker Images

on:
  push:
    branches:
      - main
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install backend dependencies
        working-directory: ./backend
        run: bun install --frozen-lockfile

      - name: Run backend unit tests
        working-directory: ./backend
        run: bun test middleware routes config.test.js

  # ── Build and push all images ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: rearch-frontend
            context: ./frontend
          - image: rearch-backend
            context: ./backend
          - image: rearch-mcp-proxy
            context: ./mcp-proxy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            # Push to main → dev + sha-XXXXXXX
            type=raw,value=dev,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            # Release → latest + version number (strip "v" prefix)
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
