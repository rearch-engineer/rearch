# ============================================================================
# ReArch CI/CD Pipeline - Gitea Actions
# ============================================================================
# Triggers on pushes to main branch.
# Detects which modules have changed and only builds/deploys those.
# Builds Docker images in parallel, pushes them to the Gitea container
# registry, and updates the running Docker Swarm services.
#
# Pipeline:
#   detect-changes → test (if backend changed) ──────────────────────┐
#                  → test-templates                                  │
#                  → test-e2e                                        │
#                  ↘ build-deploy-frontend  (if frontend changed) ─┐ │
#                  ↘ build-deploy-backend   (if backend changed)  ─┘─┼→ verify
#
# Required Gitea Secrets (Settings > Actions > Secrets):
#   - REGISTRY_USERNAME: Gitea username or deploy token
#   - REGISTRY_PASSWORD: Gitea password or deploy token secret
# ============================================================================

name: Deploy to Swarm

on:
  push:
    branches:
      - main

env:
  REGISTRY: git.lab34.es
  IMAGE_PREFIX: git.lab34.es/rearch
  STACK_NAME: rearch

jobs:
  # ── Detect which modules changed ──────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.changes.outputs.frontend_changed }}
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      templates_changed: ${{ steps.changes.outputs.templates_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules
        id: changes
        run: |
          # Get list of changed files between previous and current commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FULL_BUILD")

          echo "=== Changed files ==="
          echo "$CHANGED_FILES"
          echo "====================="

          # If we can't diff (e.g. first commit), build everything
          if [ "$CHANGED_FILES" = "FULL_BUILD" ]; then
            echo "Cannot diff commits — triggering full build"
            echo "frontend_changed=true" >> $GITHUB_OUTPUT
            echo "backend_changed=true" >> $GITHUB_OUTPUT
            echo "templates_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check each module path
          frontend_changed=false
          backend_changed=false
          templates_changed=false
          root_changed=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              frontend/*)                         frontend_changed=true ;;
              backend/queue/*|backend/templates/*) templates_changed=true; backend_changed=true ;;
              backend/*)                          backend_changed=true ;;
              *)                                  root_changed=true ;;
            esac
          done <<< "$CHANGED_FILES"

          # If any file outside the 4 module directories changed, build everything
          if [ "$root_changed" = "true" ]; then
            echo "Root-level files changed — triggering full build"
            frontend_changed=true
            backend_changed=true
          fi

          echo "frontend_changed=$frontend_changed" >> $GITHUB_OUTPUT
          echo "backend_changed=$backend_changed" >> $GITHUB_OUTPUT
          echo "templates_changed=$templates_changed" >> $GITHUB_OUTPUT

          echo "=== Detection results ==="
          echo "frontend:  $frontend_changed"
          echo "backend:   $backend_changed"
          echo "templates: $templates_changed"
          echo "========================="

  # ── Backend tests (only if backend changed) ───────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install backend dependencies
        working-directory: ./backend
        run: bun install --frozen-lockfile

      - name: Run backend unit tests
        working-directory: ./backend
        run: bun test middleware routes config.test.js

  # ── Backend template integration tests (only if backend changed) ───────────
  test-templates:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: false # needs.detect-changes.outputs.templates_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install backend dependencies
        working-directory: ./backend
        run: bun install --frozen-lockfile

      - name: Run template integration tests
        working-directory: ./backend
        run: bun run test:templates

  # ── E2E browser tests (disabled — enable when infrastructure is ready) ────
  test-e2e:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-deploy-frontend, build-deploy-backend]
    if: false # needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install e2e dependencies
        working-directory: ./e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: ./e2e
        run: npm run test:e2e

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

  # ── Frontend (React SPA) ──────────────────────────────────────────────────
  build-deploy-frontend:
    runs-on: ubuntu-latest
    needs: [detect-changes, test, test-templates]
    if: >-
      always() &&
      !cancelled() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.test-templates.result == 'success' || needs.test-templates.result == 'skipped') &&
      needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Gitea Container Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/frontend:latest \
            -t ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.vars.outputs.sha_short }} \
            ./frontend

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/frontend:latest
          docker push ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.vars.outputs.sha_short }}

      - name: Update Swarm service
        run: |
          docker service update \
            --image ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.vars.outputs.sha_short }} \
            --with-registry-auth \
            --no-resolve-image \
            --update-order start-first \
            --update-failure-action rollback \
            --update-delay 10s \
            --update-monitor 10s \
            ${{ env.STACK_NAME }}_frontend

  # ── Backend (Express.js API) ──────────────────────────────────────────────
  build-deploy-backend:
    runs-on: ubuntu-latest
    needs: [detect-changes, test, test-templates]
    if: >-
      always() &&
      !cancelled() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.test-templates.result == 'success' || needs.test-templates.result == 'skipped') &&
      needs.detect-changes.outputs.backend_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Gitea Container Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/backend:latest \
            -t ${{ env.IMAGE_PREFIX }}/backend:${{ steps.vars.outputs.sha_short }} \
            ./backend

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/backend:latest
          docker push ${{ env.IMAGE_PREFIX }}/backend:${{ steps.vars.outputs.sha_short }}

      - name: Update Swarm service
        run: |
          docker service update \
            --image ${{ env.IMAGE_PREFIX }}/backend:${{ steps.vars.outputs.sha_short }} \
            --with-registry-auth \
            --no-resolve-image \
            --update-order start-first \
            --update-failure-action rollback \
            --update-delay 10s \
            --update-monitor 10s \
            ${{ env.STACK_NAME }}_backend

  # ── Verify all deployments ────────────────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test-templates
      - test-e2e
      - build-deploy-frontend
      - build-deploy-backend
    if: always()
    steps:
      - name: Verify deployment
        run: |
          echo "=== Deployment Summary ==="
          echo ""

          if [ "${{ needs.detect-changes.outputs.frontend_changed }}" = "true" ]; then
            echo "=== Frontend service status ==="
            docker service ps ${{ env.STACK_NAME }}_frontend --no-trunc \
              --filter "desired-state=running" \
              --format "table {{.Name}}\t{{.Image}}\t{{.CurrentState}}\t{{.Error}}" || true
          else
            echo "=== Frontend: SKIPPED (no changes) ==="
          fi

          echo ""

          if [ "${{ needs.detect-changes.outputs.backend_changed }}" = "true" ]; then
            echo "=== Backend service status ==="
            docker service ps ${{ env.STACK_NAME }}_backend --no-trunc \
              --filter "desired-state=running" \
              --format "table {{.Name}}\t{{.Image}}\t{{.CurrentState}}\t{{.Error}}" || true
          else
            echo "=== Backend: SKIPPED (no changes) ==="
          fi

          echo ""

      - name: Check for failures
        if: >-
          contains(needs.build-deploy-frontend.result, 'failure') ||
          contains(needs.build-deploy-backend.result, 'failure')
        run: |
          echo "One or more deploy jobs failed!"
          echo "  frontend: ${{ needs.build-deploy-frontend.result }}"
          echo "  backend:  ${{ needs.build-deploy-backend.result }}"
          exit 1
